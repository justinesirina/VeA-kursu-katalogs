# NF4 veiktspējas testēšanas profils
# Aktivizē ar: mvn spring-boot:run -Dspring-boot.run.profiles=nf4
#
# Pievieno alternatīvu DB savienojumu un alternatīvu portu, lai neietekmētu
# docker-compose stack, kas izpilda backendu uz 8080 ar īsto course_catalog DB.
# Profils aktivē Nf4SeedRunner, kas bez datu dublēšanas seedē 1000 fake kursus ar
# prefiksu "NF4-" tikai šajā klonētajā DB.

server.port=8081

# Klonēta course_catalog kopija
spring.datasource.url=jdbc:postgresql://localhost:5432/course_catalog_nf4
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}

# Vairāk informatīvas log ziņas seed laikā
logging.level.lv.venta.coursecatalog.initializer=INFO
