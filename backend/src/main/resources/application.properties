server.port=8080

# F14, NF2 prasība: sesijas beigas pēc 30 min neaktivitātes.
server.servlet.session.timeout=30m

# Database — credentials loaded from environment variables (.env), with local defaults as fallback
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/course_catalog}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway pārvalda shēmas izmaiņas; Hibernate tikai validē, ka tabulas atbilst entītijām
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — DB migrāciju izsekošana
# Migrāciju faili: backend/src/main/resources/db/migration/VYYYYMMDDHHmm__name.sql
# baseline-on-migrate=true ļauj Flyway pievienoties esošai DB, kas izveidota ar ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

logging.level.org.springframework=INFO
logging.level.lv.venta=DEBUG
logging.level.org.hibernate=ERROR

# Profile overrides — set SPRING_PROFILES_ACTIVE=prod for production (ddl-auto=validate)

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
