server.port=8080

# F14, NF2 prasība: sesijas beigas pēc 30 min neaktivitātes.
server.servlet.session.timeout=30m

# Database — credentials loaded from environment variables (.env), with local defaults as fallback
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/course_catalog}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Hibernate izveido/papildina shēmu no entītijām. Fresh DB: Hibernate vispirms uzbūvē tabulas,
# tad FlywayPostInitRunner palaiž V11 seed datus (skat. FlywayConfig.java).
# Esošās DB ar V1-V10 vēsturi turpina darboties bez izmaiņām (baseline-on-migrate).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway — DB migrāciju izsekošana
# Migrāciju faili: backend/src/main/resources/db/migration/V##__name.sql
# baseline-version=10: fresh DB ar Hibernate-izveidotu shēmu uzskata V1-V10 par pielietotām,
# palaiž tikai V11+ (seed dati). Esošās DB ar pilnu V1-V10 vēsturi turpina, kā ir.
# Spring Boot noklusētā Flyway autorun ir izslēgta caur FlywayMigrationStrategy bean
# (skat. FlywayConfig.java) — migrācija notiek pēc JPA init, lai shēma jau eksistētu.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=10
spring.flyway.locations=classpath:db/migration

logging.level.org.springframework=INFO
logging.level.lv.venta=DEBUG
logging.level.org.hibernate=ERROR

# Profile overrides — set SPRING_PROFILES_ACTIVE=prod for production (ddl-auto=validate)

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
