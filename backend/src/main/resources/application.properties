server.port=8080

# Database — credentials loaded from environment variables (.env), with local defaults as fallback
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/course_catalog}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Active profile overrides (dev / prod) — set via SPRING_PROFILES_ACTIVE env var
# dev  → application-dev.properties  (ddl-auto=update, INFO logging)
# prod → application-prod.properties (ddl-auto=validate, WARN logging)
