$kind: http-request
name: "F14: Login neizdodas ar nepareizu paroli (-> 401)"
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "email": "sysadmin@venta.lv",
        "password": "wrong-password"
    }
scripts:
  - type: afterResponse
    code: pm.test('HTTP 401 Unauthorized', () => pm.response.to.have.status(401));
    language: text/javascript
order: 10000
