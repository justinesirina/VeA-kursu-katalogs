$kind: http-request
name: "F2: GET visu kursu sarakstu"
url: "{{base_url}}/api/courses"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('HTTP 200 OK', () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test('Atbilde ir masivs ar vismaz vienu kursu', () => {
          pm.expect(json).to.be.an('array');
          pm.expect(json.length).to.be.at.least(1);
      });
    language: text/javascript
order: 3000
