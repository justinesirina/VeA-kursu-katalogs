version: '3.8'

services:

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: course_catalog
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - course_catalog_network

  backend-app:
    build:
      context: ./backend
    container_name: backend-app
    depends_on:
      - postgres-db
    ports:
      - "8080:8080"
    networks:
      - course_catalog_network

  frontend-app:
    build:
      context: ./frontend/reactapp
      dockerfile: Dockerfile.dev
    container_name: frontend-app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/reactapp:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend-app
    networks:
      - course_catalog_network

volumes:
  postgres_data:

networks:
  course_catalog_network:
    driver: bridge
