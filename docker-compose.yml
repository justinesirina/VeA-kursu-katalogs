services:

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: course_catalog
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # Healthcheck nodrošina, ka backend gaida, līdz Postgres ir gatava pieņemt savienojumus,
    # nevis tikai līdz konteiners ir startēts. pg_isready ir bundled Postgres rīks.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d course_catalog"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - course_catalog_network

  backend-app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-app
    # condition: service_healthy nozīmē "gaidi līdz postgres healthcheck atgriež OK",
    # nevis tikai "gaidi līdz konteiners startēts"
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/course_catalog
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - course_catalog_network

  frontend-app:
    build:
      context: ./frontend/reactapp
      dockerfile: Dockerfile.dev
    container_name: frontend-app
    depends_on:
      - backend-app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/reactapp:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # REACT_APP_* env mainīgie tiek iestrādāti JS bundlē, kuru izpilda BROWSER uz host.
      # Browser nevar atrisināt Docker iekšējo hostname `backend-app` — jāizmanto localhost,
      # jo backend ports 8080 ir publicēts uz host (`ports: "8080:8080"`).
      - REACT_APP_API_URL=http://localhost:8080/api
    stdin_open: true
    tty: true
    networks:
      - course_catalog_network

networks:
  course_catalog_network:
    driver: bridge
